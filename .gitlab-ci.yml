stages:
  - test
  - deploy

variables:
    APT_PKGS: "libcurl4-openssl-dev libssh2-1-dev libssl-dev libxml2-dev zlib1g-dev git build-essential gobjc++ libomp-dev libmagick++-6.q16-dev tk dialog libharfbuzz-dev libfribidi-dev libudunits2-dev libgdal-dev libgeos-dev libproj-dev cmake wget librtmp-dev"
    _R_CHECK_FORCE_SUGGESTS_: "false"
    TT_AT_HOME: "true"

before_script:
  - apt-get update
  - apt-get install -y --no-install-recommends ${APT_PKGS}
  - export LD_LIBRARY_PATH="/usr/local/lib/R/lib:${LD_LIBRARY_PATH}"
  - echo "options(Ncpus = $(nproc --all))" >> /usr/local/lib/R/etc/Rprofile.site
  - Rscript -e "update.packages(ask = FALSE, checkBuilt = TRUE)"
  - Rscript -e "install.packages('pak')"
  - Rscript -e 'pak::local_install_dev_deps(upgrade = FALSE)'

r-release:
  stage: test
  tags:
    - Docker
  image: rocker/verse:latest
  script:
    - Rscript -e 'devtools::check(check_dir = ".")'
  artifacts:
    paths:
      - "*.Rcheck"
    name: logs
    when: always
    expire_in: 1 month

r-devel:
  stage: test
  tags:
    - Docker
  image: rocker/verse:devel
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ${APT_PKGS}
    - export LD_LIBRARY_PATH="/usr/local/lib/R/lib:${LD_LIBRARY_PATH}"
    - echo "options(Ncpus = $(nproc --all))" >> /usr/local/lib/R/etc/Rprofile.site
    - Rscript -e "remove.packages(setdiff(installed.packages()[,1], rownames(installed.packages(priority='base'))))"
    - Rscript -e "install.packages(c('remotes', 'rcmdcheck'), type = 'source', ask = FALSE)"
    - Rscript -e "remotes::install_deps(dependencies = TRUE, type = 'source', upgrade = 'always')"
  script:
    - R CMD build .
    - R CMD check --as-cran *.tar.gz
  artifacts:
    paths:
      - "*.Rcheck"
    name: logs
    when: always
    expire_in: 1 month

coverage:
  stage: deploy
  tags:
    - Docker
  image: rocker/verse:latest
  when: on_success
  script:
    - install2.r covr
    - Rscript -e 'devtools::install()'
    - Rscript -e 'covr::package_coverage(type = "none", code = "tinytest::run_test_dir(at_home = TRUE)")'
  coverage: '/Coverage:\s*(\d+.\d+\%)/'
